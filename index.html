<!DOCTYPE html>
<!--
====================================================
MBC Health Check
Version: 1.2.0
Update:
- Professional risk answer options
- Clean production validation
- Stable architecture
====================================================
-->

<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MBC Health Check v1.2.0</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

</head>

<body class="bg-gradient-to-br from-emerald-50 to-green-100 min-h-screen p-6">

<div class="max-w-5xl mx-auto bg-white rounded-3xl shadow-2xl p-8">

<h1 class="text-3xl font-bold text-center text-emerald-700 mb-6">
Coaching Dashboard
</h1>

<div class="flex justify-center space-x-4 mb-8">
<button onclick="showTab(1)" class="tab-btn">ค่าร่างกาย</button>
<button onclick="showTab(2)" class="tab-btn">ปัจจัย</button>
<button onclick="showTab(3)" class="tab-btn">สรุป</button>
</div>

<!-- ================= BODY ================= -->

<div id="tab1">

<input id="clientNameInput" type="text" placeholder="ชื่อผู้รับการประเมิน" class="input">
<input id="weightInput" type="number" placeholder="น้ำหนัก (kg)" class="input">
<input id="heightInput" type="number" placeholder="ส่วนสูง (cm)" class="input">
<input id="ageInput" type="number" placeholder="อายุ" class="input">
<input id="bodyfatInput" type="number" placeholder="%ไขมัน" class="input">
<input id="muscleInput" type="number" placeholder="มวลกล้ามเนื้อ (kg)" class="input">
<input id="VFatInput" type="number" placeholder="ไขมันช่องท้อง" class="input">

<select id="genderInput" class="input">
<option value="">เลือกเพศ</option>
<option value="female">หญิง</option>
<option value="male">ชาย</option>
</select>

<button onclick="analyzeBody()" class="primary-btn">
บันทึกข้อมูล
</button>

<div id="bodyResult" class="mt-4 text-green-700 text-sm"></div>

</div>

<!-- ================= RISK ================= -->

<div id="tab2" class="hidden">
<div id="riskContainer"></div>

<button onclick="calculateRisk()" class="secondary-btn">
ประเมินผล
</button>

<div id="riskResult" class="mt-4 text-green-700 text-sm"></div>

</div>

<!-- ================= SUMMARY ================= -->

<div id="tab3" class="hidden">

<button onclick="saveImage()" 
class="bg-blue-600 text-white px-4 py-2 rounded-xl mb-3">
บันทึกเป็นรูปภาพ
</button>

<div id="summarySection"></div>

</div>

</div>

<script>

/* =====================================================
GLOBAL STATE
===================================================== */

const APP_VERSION="1.2.0";
let globalData={body:null,risk:null};

/* =====================================================
UI STYLE
===================================================== */

document.querySelectorAll(".input").forEach(i=>{
i.classList.add("w-full","p-2","border","rounded-xl","mb-2");
});

document.querySelectorAll(".tab-btn").forEach(btn=>{
btn.classList.add("px-4","py-2","rounded-xl","bg-gray-300");
});

document.querySelectorAll(".primary-btn").forEach(btn=>{
btn.classList.add("bg-emerald-600","text-white","w-full","py-2","rounded-xl","mt-2");
});

document.querySelectorAll(".secondary-btn").forEach(btn=>{
btn.classList.add("bg-orange-500","text-white","w-full","py-2","rounded-xl","mt-4");
});

/* =====================================================
TAB NAVIGATION
===================================================== */

function showTab(n){

["tab1","tab2","tab3"].forEach(t=>{
document.getElementById(t).classList.add("hidden");
});

document.getElementById("tab"+n).classList.remove("hidden");

if(n===3) generateSummary();

}

/* =====================================================
VALIDATION
===================================================== */

function isValidNumber(v,min,max){

if(v===""||isNaN(v)||v<min||v>max) return false;

return true;

}

/* =====================================================
BODY ANALYSIS
===================================================== */

function analyzeBody(){

let w=parseFloat(weightInput.value);
let h=parseFloat(heightInput.value);
let a=parseInt(ageInput.value);
let bf=parseFloat(bodyfatInput.value);
let m=parseFloat(muscleInput.value);
let vf=parseFloat(VFatInput.value);
let g=genderInput.value;

if(!isValidNumber(w,30,250)) return alert("น้ำหนักไม่ถูกต้อง");
if(!isValidNumber(h,120,220)) return alert("ส่วนสูงไม่ถูกต้อง");
if(!isValidNumber(a,10,100)) return alert("อายุไม่ถูกต้อง");
if(!isValidNumber(bf,3,60)) return alert("%ไขมันไม่ถูกต้อง");
if(!isValidNumber(m,5,80)) return alert("มวลกล้ามเนื้อไม่ถูกต้อง");
if(!isValidNumber(vf,0,80)) return alert("ไขมันช่องท้องไม่ถูกต้อง");
if(!g) return alert("กรุณาเลือกเพศ");

let H=h/100;

let weightMin=18.5*H*H;
let weightMax=22.9*H*H;

let stdWeight=(g==="male")?H*H*22:H*H*21;

let muscleMin=(g==="male")?stdWeight*0.42:stdWeight*0.35;
let muscleMax=(g==="male")?stdWeight*0.48:stdWeight*0.40;

let fatPercentMax=(g==="male")?20:28;

let fatKgMax=w*(fatPercentMax/100);
let currentFat=w*(bf/100);

let fatAdvice=currentFat>fatKgMax
? "ควรลดไขมันประมาณ "+(currentFat-fatKgMax).toFixed(1)+" กก."
: "ไขมันอยู่ในช่วงมาตรฐาน";

let muscleAdvice=m<muscleMin
? "ควรเพิ่มกล้ามเนื้ออย่างน้อย "+(muscleMin-m).toFixed(1)+" กก."
: "กล้ามเนื้ออยู่ในช่วงมาตรฐาน";

globalData.body={w,h,a,bf,m,g,vf,weightMin,weightMax,muscleMin,muscleMax,fatAdvice,muscleAdvice};

bodyResult.innerHTML="✅ บันทึกข้อมูลเรียบร้อย";

}

/* =====================================================
RISK QUESTIONS
===================================================== */

const riskData=[

{
title:"Nutrition",
description:"พฤติกรรมการกิน",
questions:[
{
text:"คุณสามารถหลีกเลี่ยงอาหารแปรรูป ข้าวขาว น้ำหวาน หรือเบเกอรี่ ได้มากน้อยเพียงใด?",
options:["ทานเป็นประจำ","พยายามหลีกเลี่ยง","หลีกเลี่ยงได้เกือบทั้งหมด"]
},
{
text:"คุณสามารถจัดสัดส่วนอาหาร 2:1:1 ได้มากน้อยเพียงใด?",
options:["ไม่ค่อยได้ทำ","ทำบางมื้อ","ทำได้เกือบทุกมื้อ"]
},
{
text:"คุณได้รับโปรตีนเพียงพอทุกวันหรือไม่?",
options:["ไม่เพียงพอ","บางวัน","เพียงพอสม่ำเสมอ"]
}
]
},

{
title:"Activity",
description:"การออกกำลังกาย",
questions:[
{
text:"คุณออกกำลังกายคาร์ดิโอ 150 นาทีต่อสัปดาห์ได้หรือไม่?",
options:["แทบไม่ได้ออก","ออกบ้าง","เกิน 150 นาที"]
},
{
text:"คุณทำเวทเทรนนิ่งอย่างน้อย 2 ครั้งต่อสัปดาห์หรือไม่?",
options:["ไม่เคย","ทำบ้าง","ทำสม่ำเสมอ"]
},
{
text:"คุณลุกเดินหรือขยับตัวทุก 1 ชั่วโมงหรือไม่?",
options:["นั่งยาวทั้งวัน","ขยับบ้าง","ขยับทุกชั่วโมง"]
}
]
},

{
title:"Sleep",
description:"คุณภาพการนอน",
questions:[
{
text:"คุณนอน 7-9 ชั่วโมงต่อคืนหรือไม่?",
options:["น้อยกว่า 6 ชั่วโมง","ประมาณ 6-7 ชั่วโมง","7-9 ชั่วโมง"]
},
{
text:"คุณตื่นแล้วสดชื่นหรือไม่?",
options:["ยังเพลีย","ปกติ","สดชื่น"]
},
{
text:"คุณนอนเวลาเดิมทุกวันหรือไม่?",
options:["ไม่สม่ำเสมอ","พยายามทำ","สม่ำเสมอ"]
}
]
},

{
title:"Stress",
description:"การจัดการความเครียด",
questions:[
{
text:"คุณสามารถจัดการความเครียดได้หรือไม่?",
options:["เครียดบ่อย","เครียดบางครั้ง","จัดการได้ดี"]
},
{
text:"คุณกินตามอารมณ์หรือไม่?",
options:["บ่อย","บางครั้ง","ไม่ค่อย"]
},
{
text:"คุณมีเวลาผ่อนคลายทุกวันหรือไม่?",
options:["แทบไม่มี","มีบ้าง","มีทุกวัน"]
}
]
},

{
title:"Mindset",
description:"แนวคิดสุขภาพ",
questions:[
{
text:"คุณสนใจองค์ประกอบร่างกายมากกว่าน้ำหนักหรือไม่?",
options:["สนใจแต่น้ำหนัก","ดูทั้งสอง","เน้นองค์ประกอบ"]
},
{
text:"คุณเชื่อในการปรับไลฟ์สไตล์ระยะยาวหรือไม่?",
options:["ไม่ค่อยเชื่อ","เชื่อบางส่วน","เชื่อเต็มที่"]
},
{
text:"เมื่อหลุดแผนคุณกลับมาได้หรือไม่?",
options:["หลุดยาว","พยายามกลับ","กลับทันที"]
}
]
},

{
title:"Water",
description:"พฤติกรรมการดื่มน้ำ",
questions:[
{
text:"คุณดื่มน้ำวันละ 1.5 ลิตรหรือไม่?",
options:["น้อยกว่า 1 ลิตร","ประมาณ 1-1.5","มากกว่า 1.5"]
},
{
text:"คุณจำกัดเครื่องดื่มหวานหรือไม่?",
options:["ดื่มทุกวัน","ดื่มบ้าง","ไม่ดื่ม"]
},
{
text:"คุณพกขวดน้ำหรือไม่?",
options:["ไม่พก","พกบางวัน","พกทุกวัน"]
}
]
},

{
title:"Microbiome",
description:"สุขภาพลำไส้",
questions:[
{
text:"คุณทานผักผลไม้หลากสีหรือไม่?",
options:["น้อยมาก","บ้าง","ทุกวัน"]
},
{
text:"คุณขับถ่ายสม่ำเสมอหรือไม่?",
options:["ท้องผูก","บางครั้ง","ปกติ"]
},
{
text:"คุณทานอาหารหมักดองหรือโปรไบโอติกส์หรือไม่?",
options:["ไม่ทาน","บางครั้ง","สม่ำเสมอ"]
}
]
}

];

function initRisk(){

let html="";

riskData.forEach((factor,i)=>{

html+=`<div class="mt-6 p-4 bg-gray-50 rounded-xl">

<h3 class="font-bold text-emerald-700 text-lg">${factor.title}</h3>
<p class="text-sm text-gray-600 mb-3">${factor.description}</p>`;

factor.questions.forEach((q,j)=>{

html+=`
<div class="mb-4">
<label class="block mb-2">${j+1}. ${q.text}</label>

<select class="risk input" data-factor="${i}">

<option value="0">${q.options[0]}</option>
<option value="1">${q.options[1]}</option>
<option value="2">${q.options[2]}</option>

</select>

</div>`;

});

html+="</div>";

});

riskContainer.innerHTML=html;

}

window.onload=initRisk;

/* =====================================================
CALCULATE RISK
===================================================== */

function calculateRisk(){

let scores=new Array(riskData.length).fill(0);

document.querySelectorAll(".risk").forEach(s=>{
scores[s.dataset.factor]+=parseInt(s.value);
});

globalData.risk=scores;

riskResult.innerHTML="✅ บันทึกคะแนนเรียบร้อย";

}

/* =====================================================
SUMMARY
===================================================== */

function generateSummary(){

if(!globalData.body||!globalData.risk){
summarySection.innerHTML="กรุณาประเมินให้ครบก่อน";
return;
}

let d=globalData.body;
let name=clientNameInput.value||"ไม่ระบุชื่อ";
let dateString=new Date().toLocaleDateString("th-TH");

let factorList="";

globalData.risk.forEach((score,i)=>{
factorList+=`
<div class="flex justify-between border-b py-1">
<span>${riskData[i].title}</span>
<span class="font-bold">${score}/6</span>
</div>`;
});

summarySection.innerHTML=
`
<div class="bg-white p-4 rounded-2xl shadow text-sm leading-relaxed">

<div class="text-center mb-3">
<h2 class="text-lg font-bold text-emerald-700">
รายงานสุขภาพ
</h2>
${name}<br>
${dateString}
</div>

<div class="grid grid-cols-2 gap-2 mb-3">

<div class="bg-gray-50 p-2 rounded">
น้ำหนัก<br>
<b>${d.w} kg</b>
</div>

<div class="bg-gray-50 p-2 rounded">
ไขมัน<br>
<b>${d.bf}%</b>
</div>

<div class="bg-gray-50 p-2 rounded">
กล้ามเนื้อ<br>
<b>${d.m} kg</b>
</div>

<div class="bg-gray-50 p-2 rounded">
ไขมันช่องท้อง<br>
<b>${d.vf}</b>
</div>

</div>

<div class="mb-3">

<h3 class="font-bold text-emerald-700">
ค่ามาตรฐาน
</h3>

น้ำหนัก: ${d.weightMin.toFixed(1)} - ${d.weightMax.toFixed(1)} kg<br>
กล้ามเนื้อ: ${d.muscleMin.toFixed(1)} - ${d.muscleMax.toFixed(1)} kg

</div>

<div class="mb-3">

<h3 class="font-bold text-emerald-700">
สรุปการประเมิน
</h3>

${d.fatAdvice}<br>
${d.muscleAdvice}

</div>

<div>

<h3 class="font-bold text-emerald-700">
คะแนนปัจจัยสุขภาพ
</h3>

${factorList}

</div>

</div>
`;

}

/* =====================================================
EXPORT IMAGE
===================================================== */

function saveImage(){

html2canvas(document.getElementById("summarySection"))
.then(canvas=>{

let link=document.createElement("a");
link.download="health-report.png";
link.href=canvas.toDataURL();
link.click();

});

}

</script>

</body>
</html>
