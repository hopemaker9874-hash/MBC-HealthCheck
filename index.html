<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MBC Health Check</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>

.input{
width:100%;
padding:10px;
border:1px solid #ddd;
border-radius:10px;
margin-bottom:10px;
}

.primary-btn{
background:#059669;
color:white;
padding:10px;
border-radius:10px;
width:100%;
}

.secondary-btn{
background:#f97316;
color:white;
padding:10px;
border-radius:10px;
width:100%;
margin-top:10px;
}

.tab-btn{
padding:10px 14px;
border-radius:10px;
font-weight:600;
}

</style>

</head>

<body class="bg-gradient-to-br from-emerald-50 to-green-100 min-h-screen p-6">

<div class="max-w-5xl mx-auto bg-white rounded-3xl shadow-2xl p-8">

<h1 class="text-3xl font-bold text-center text-emerald-700 mb-6">
MBC Health Check
</h1>

<div class="flex justify-center space-x-4 mb-8 flex-wrap">

<button onclick="showTab(1)" class="tab-btn bg-emerald-600 text-white">วิเคราะห์ร่างกาย</button>
<button onclick="showTab(2)" class="tab-btn bg-orange-500 text-white">ประเมินสุขภาพ</button>
<button onclick="showTab(3)" class="tab-btn bg-indigo-600 text-white">สัดส่วนอาหาร</button>
<button onclick="showTab(4)" class="tab-btn bg-blue-600 text-white">รายงานสรุป</button>

</div>

<!-- BODY -->

<div id="tab1">

<input id="clientNameInput" type="text" placeholder="ชื่อผู้รับการประเมิน" class="input">
<select id="scaleType" class="input">
<option value="">เลือกประเภทเครื่องชั่ง</option>
<option value="inbody">InBody / InBody Dial</option>
<option value="omron">Omron (% กล้ามเนื้อ)</option>
</select>
<input id="weightInput" type="number" placeholder="น้ำหนัก (kg)" class="input">
<input id="heightInput" type="number" placeholder="ส่วนสูง (cm)" class="input">
<input id="bodyfatInput" type="number" placeholder="%ไขมัน" class="input">
<input id="muscleInput" type="number" placeholder="มวลกล้ามเนื้อ " class="input">
<input id="VFatInput" type="number" placeholder="ไขมันช่องท้อง" class="input">

   <select id="genderInput" class="input">
<option value="">เลือกเพศ</option>
<option value="male">ชาย</option>
<option value="female">หญิง</option>
</select>

<select id="goalInput" class="input">
<option value="fatloss">ลดไขมัน</option>
<option value="weightloss">ลดน้ำหนัก</option>
<option value="muscle">เพิ่มกล้ามเนื้อ</option>
<option value="recomp">ปรับองค์ประกอบร่างกาย</option>
</select>

<button onclick="analyzeBody()" class="primary-btn">
วิเคราะห์องค์ประกอบร่างกาย
</button>

<div id="bodyResult" class="mt-4"></div>

</div>

<!-- RISK -->

<div id="tab2" class="hidden">

<div id="riskContainer"></div>

<button onclick="calculateRisk()" class="secondary-btn">ประเมินผล</button>

<div id="riskResult" class="mt-4"></div>

</div>

<!-- NUTRITION -->

<div id="tab3" class="hidden">

<div class="bg-white p-4 rounded-xl shadow">

<h2 class="font-bold text-lg text-indigo-700 mb-3">
คำนวณสัดส่วนอาหาร
</h2>

<div id="nutritionResult"></div>

</div>

</div>

<!-- SUMMARY -->

<div id="tab4" class="hidden">

<button onclick="saveImage()" class="bg-blue-600 text-white px-4 py-2 rounded-xl mb-3">
บันทึกเป็นรูป
</button>

<div id="summarySection"></div>

</div>

</div>

<script>

/* GLOBAL */

let globalData={
body:null,
riskSummary:null
};

/* TAB */

function showTab(n){

["tab1","tab2","tab3","tab4"].forEach(t=>{
document.getElementById(t).classList.add("hidden");
});

document.getElementById("tab"+n).classList.remove("hidden");

if(n===3) generateNutrition();
if(n===4) generateSummary();

}

/* BODY */

function analyzeBody(){

/* ======================
อ่านค่าจาก input
====================== */

let name = document.getElementById("clientNameInput").value || "ไม่ระบุชื่อ"

let scale = document.getElementById("scaleType").value

let w = parseFloat(document.getElementById("weightInput").value)
let h = parseFloat(document.getElementById("heightInput").value)
let bf = parseFloat(document.getElementById("bodyfatInput").value)
let m = parseFloat(document.getElementById("muscleInput").value)
let vf = parseFloat(document.getElementById("VFatInput").value)

let g = document.getElementById("genderInput").value
let goal = document.getElementById("goalInput")?.value || "fatloss"
/* ======================
validation
====================== */

if(!w || !h || !bf || !m || !vf || !g){

alert("กรอกข้อมูลให้ครบ")

return

}

/* ======================
Omron % muscle convert
====================== */

if(scale==="omron"){

m = w*(m/100)

}

/* ======================
BMI
====================== */

let H = h/100

let bmi = w/(H*H)

/* ======================
Weight standard
====================== */

let weightMin = 18.5*(H*H)
let weightMax = 22.9*(H*H)

/* ======================
Fat standard
====================== */


let fatPercentMin = (g==="male")?10:18
let fatPercentMax = (g==="male")?20:28

let fatMass = w*(bf/100)

let fatMinKg = w*(fatPercentMin/100)
let fatMaxKg = w*(fatPercentMax/100)
/* ======================
Muscle standard
====================== */

let stdWeight = (g==="male")?H*H*22:H*H*21

let muscleMin = (g==="male")?stdWeight*0.42:stdWeight*0.35
let muscleMax = (g==="male")?stdWeight*0.48:stdWeight*0.40

/* ======================
Goal check
====================== */

let goalAdvice = ""

if(goal==="weightloss" && bmi<=23){

goalAdvice = "BMI อยู่ในเกณฑ์ปกติ แนะนำเปลี่ยนเป้าหมายเป็น ลดไขมัน"

}

if(goal==="fatloss" && bf<fatPercentMax){

goalAdvice = "ไขมันอยู่ในเกณฑ์ปกติ แนะนำเป้าหมาย ปรับองค์ประกอบร่างกาย"

}

if(goal==="muscle" && m>=muscleMax){

goalAdvice = "มวลกล้ามเนื้ออยู่ในระดับดีแล้ว"

}

/* ======================
Change calculation
====================== */

let weightChange = 0

if(w>weightMax){

weightChange = w-weightMax

}

if(w<weightMin){

weightChange = weightMin-w

}

let fatToLose = Math.max(0,fatMass-((fatMaxKg+fatMinKg)/2))

let muscleToGain = Math.max(0,muscleMin-m)

/* ======================
save data
====================== */

globalData.body={

name:name,
goal:goal,

w:w,
bf:bf,
m:m,
vf:vf,

bmi:bmi,

weightMin:weightMin,
weightMax:weightMax,

fatPercentMin:fatPercentMin,
fatPercentMax:fatPercentMax,

muscleMin:muscleMin,
muscleMax:muscleMax,

fatToLose:fatToLose,
muscleToGain:muscleToGain,
weightChange:weightChange

}

/* ======================
display
====================== */

let html =

`
<div class="bg-green-50 p-4 rounded-xl text-sm">

<h3 class="font-bold text-emerald-700 mb-3">
ผลการวิเคราะห์ร่างกาย
</h3>

ชื่อ : ${name}<br>
BMI : ${bmi.toFixed(1)}<br>
Goal : ${goal}<br>

${goalAdvice ? `<div class="text-orange-600 mt-2">${goalAdvice}</div>` : ""}

<br>

<b>น้ำหนัก</b><br>

ปัจจุบัน ${w} kg<br>
มาตรฐาน ${weightMin.toFixed(1)} - ${weightMax.toFixed(1)} kg

<br><br>

<b>ไขมันในร่างกาย</b><br>

${bf}% (${fatMass.toFixed(1)} kg)<br>
ช่วงมาตรฐาน ${fatMinKg.toFixed(1)} - ${fatMaxKg.toFixed(1)} kg
<br>
<b>กล้ามเนื้อ</b><br>

${m.toFixed(1)} kg<br>
มาตรฐาน ${muscleMin.toFixed(1)} - ${muscleMax.toFixed(1)} kg

<br><br>

<h3 class="font-bold text-emerald-700">
คำแนะนำ
</h3>

ปรับน้ำหนัก ${weightChange.toFixed(1)} kg<br>
ปรับไขมัน ${fatToLose.toFixed(1)} kg<br>
ปรับกล้ามเนื้อ ${muscleToGain.toFixed(1)} kg

</div>
`

document.getElementById("bodyResult").innerHTML = html

}
   
   
/* RISK DATA */

const riskData=[

{title:"Nutrition",questions:[
{text:"คุณทานอาหารแปรรูปบ่อยแค่ไหน?",options:["ทุกวัน","บางครั้ง","แทบไม่"]},
{text:"คุณจัดจานอาหาร 2:1:1 ได้หรือไม่?",options:["ไม่เคย","บางมื้อ","สม่ำเสมอ"]},
{text:"คุณได้รับโปรตีนเพียงพอหรือไม่?",options:["ไม่พอ","บางวัน","เพียงพอ"]}
]},

{title:"Activity",questions:[
{text:"คุณออกกำลังกาย150นาที/สัปดาห์หรือไม่?",options:["ไม่ออก","บางครั้ง","สม่ำเสมอ"]},
{text:"คุณทำเวทเทรนนิ่งหรือไม่?",options:["ไม่เคย","บางครั้ง","ทุกสัปดาห์"]},
{text:"คุณลุกขยับตัวทุก1ชมไหม?",options:["นั่งยาว","ลุกบ้าง","สม่ำเสมอ"]}
]},

{title:"Sleep",questions:[
{text:"คุณนอนกี่ชั่วโมง?",options:["<6","6-7","7-9"]},
{text:"คุณตื่นแล้วสดชื่นไหม?",options:["เพลีย","ปกติ","สดชื่น"]},
{text:"คุณนอนเวลาเดิมไหม?",options:["ไม่สม่ำเสมอ","บางวัน","สม่ำเสมอ"]}
]},

{title:"Stress",questions:[
{text:"คุณเครียดบ่อยไหม?",options:["บ่อย","บางครั้ง","ไม่บ่อย"]},
{text:"คุณกินตามอารมณ์ไหม?",options:["บ่อย","บางครั้ง","ไม่ค่อย"]},
{text:"คุณมีเวลาผ่อนคลายไหม?",options:["แทบไม่มี","บางวัน","มีประจำ"]}
]},

{title:"Mindset",questions:[
{text:"คุณเน้นน้ำหนักหรือองค์ประกอบร่างกาย?",options:["น้ำหนัก","ทั้งคู่","องค์ประกอบ"]},
{text:"คุณเชื่อการปรับไลฟ์สไตล์ไหม?",options:["ไม่ค่อย","บางส่วน","เต็มที่"]},
{text:"เมื่อหลุดแผนคุณกลับมาได้ไหม?",options:["ยาก","พยายาม","กลับได้"]}
]},

{title:"Water",questions:[
{text:"คุณดื่มน้ำเท่าไร?",options:["<1L","1-1.5L",">1.5L"]},
{text:"คุณดื่มน้ำหวานไหม?",options:["ทุกวัน","บางครั้ง","แทบไม่"]},
{text:"คุณพกขวดน้ำไหม?",options:["ไม่พก","บางวัน","พก"]}
]},

{title:"Microbiome",questions:[
{text:"คุณกินผักผลไม้ไหม?",options:["น้อย","บางวัน","ทุกวัน"]},
{text:"ระบบขับถ่ายเป็นอย่างไร?",options:["ท้องผูก/ท้องอืด","บางครั้ง","ปกติ"]},
{text:"คุณกินโปรไบโอติกส์ไหม?",options:["ไม่กิน","บางครั้ง","สม่ำเสมอ"]}
]}

];

const riskAdvice={

Nutrition:"ลดอาหารแปรรูป เพิ่มโปรตีนคุณภาพ",

Activity:"เพิ่มการออกกำลังกายอย่างน้อย 150 นาทีต่อสัปดาห์",

Sleep:"นอนให้ได้ 7–9 ชั่วโมง",

Stress:"เพิ่มกิจกรรมผ่อนคลาย",

Mindset:"เน้นสุขภาพระยะยาว",

Water:"ดื่มน้ำ 1.5–2 ลิตร",

Microbiome:"เพิ่มผักผลไม้และไฟเบอร์"

};

/* INIT RISK */

function initRisk(){

let html="";

riskData.forEach((factor,i)=>{

html+=`<div class="bg-gray-50 p-4 rounded-xl mb-4">

<h3 class="font-bold mb-2">${factor.title}</h3>`;

factor.questions.forEach((q,j)=>{

html+=`

<label class="block mb-1">${j+1}. ${q.text}</label>

<select class="risk input" data-factor="${i}">
<option value="0">${q.options[0]}</option>
<option value="1">${q.options[1]}</option>
<option value="2">${q.options[2]}</option>
</select>

`;

});

html+="</div>";

});

riskContainer.innerHTML=html;

}

window.onload=initRisk;

/* CALCULATE RISK */

function calculateRisk(){

let scores=new Array(riskData.length).fill(0);

document.querySelectorAll(".risk").forEach(s=>{
scores[s.dataset.factor]+=parseInt(s.value);
});

let html="";
let summary=[];

scores.forEach((score,i)=>{

let factor=riskData[i].title;

let advice=riskAdvice[factor];

summary.push({title:factor,score:score,advice:advice});

html+=`

<div class="bg-white p-3 rounded-xl shadow mb-3">

<b>${factor}</b><br>

คะแนน ${score}/6<br>

คำแนะนำ : ${advice}

</div>

`;

});

globalData.riskSummary=summary;

riskResult.innerHTML=html;

}

/* GET TOP RISK */

function getTopRiskAdvice(){

let list=[...globalData.riskSummary];

list.sort((a,b)=>a.score-b.score);

return list.slice(0,3);

}

/* NUTRITION */

function generateNutrition(){

if(!globalData.body){
nutritionResult.innerHTML="กรุณาวิเคราะห์ร่างกายก่อน";
return;
}

let d = globalData.body;

let weight = d.w;
let fatPercent = d.bf;
let gender = d.g;
let bmi = d.bmi;

/* ======================
Lean Body Mass
====================== */

let lbm = weight * (1 - fatPercent/100);

/* ======================
BMR
====================== */

let bmr = 370 + (21.6 * lbm);

/* ======================
TDEE
====================== */

let tdee = bmr * 1.4;

/* ======================
เป้าหมายลดไขมัน
====================== */

let targetCalories = tdee * 0.8;

/* ======================
Protein
====================== */

let protein = lbm * 2;

/* ======================
Fat
====================== */

let fat = (targetCalories * 0.25) / 9;

/* ======================
Carb
====================== */

let carbCalories = targetCalories - (protein*4) - (fat*9);

let carb = carbCalories / 4;

/* ======================
แบ่ง carb
====================== */

let carbGrain = carb * 0.7;
let carbVeg = carb * 0.2;
let carbFruit = carb * 0.1;

/* ======================
Convert units
====================== */

/* rice */

let rice = carbGrain / 15;

/* vegetable */

let veg = carbVeg / 5;

/* fruit */

let fruit = carbFruit / 15;

/* protein → meat */

let meat = protein * 5;

/* fat → oil */

let oil = fat / 4.5;

/* ======================
Weight loss estimate
====================== */

let deficit = tdee - targetCalories;

let fatLossWeek = deficit * 7 / 7700;

let fatLossMonth = fatLossWeek * 4;

/* ======================
Display
====================== */

nutritionResult.innerHTML = `

<div class="space-y-4 text-sm">

<div class="bg-indigo-50 p-4 rounded-xl">

<div class="font-bold text-indigo-700 mb-2">
🔥 พลังงานที่แนะนำ
</div>

BMR : ${Math.round(bmr)} kcal<br>
TDEE : ${Math.round(tdee)} kcal<br>

พลังงานที่ใช้คำนวณ : 
<b>${Math.round(targetCalories)} kcal</b>

<br><br>

คาดว่าจะลดน้ำหนักได้ประมาณ

<b>${fatLossMonth.toFixed(1)} kg / เดือน</b>

</div>

<div class="bg-blue-50 p-4 rounded-xl">

<div class="font-bold text-blue-700 mb-2">
🥩 โปรตีน
</div>

${Math.round(protein)} g / วัน


≈ เนื้อสัตว์ ${Math.round(meat)} g

</div>

<div class="bg-yellow-50 p-4 rounded-xl">

<div class="font-bold text-yellow-700 mb-2">
🍚 คาร์โบไฮเดรต
</div>

รวม ${Math.round(carb)} g

<br>

ข้าว  
${Math.round(carbGrain)} g  
≈ ${rice.toFixed(1)} ทัพพี

<br>

ผัก  
${Math.round(carbVeg)} g  
≈ ${veg.toFixed(1)} ทัพพี

<br>

ผลไม้  
${Math.round(carbFruit)} g  
≈ ${fruit.toFixed(1)} ส่วน

</div>

<div class="bg-orange-50 p-4 rounded-xl">

<div class="font-bold text-orange-700 mb-2">
🥑 ไขมัน
</div>

${Math.round(fat)} g


≈ น้ำมัน ${oil.toFixed(1)} ช้อนชา

</div>

<div class="bg-green-50 p-4 rounded-xl">

<div class="font-bold text-green-700 mb-2">
🍗 ปริมาณอาหารต่อวัน
</div>

เนื้อสัตว์ ${Math.round(meat)} g

<br>

ข้าว ${rice.toFixed(1)} ทัพพี

<br>

ผัก ${veg.toFixed(1)} ทัพพี

<br>

ผลไม้ ${fruit.toFixed(1)} ส่วน

<br>

น้ำมัน ${oil.toFixed(1)} ช้อนชา

</div>

<div class="bg-gray-50 p-4 rounded-xl text-xs">

<div class="font-bold mb-2">
📚 ข้อมูลอ้างอิง
</div>

เนื้อสัตว์ 100 g ≈ โปรตีน 20 g  
<br>
ข้าว 1 ทัพพี ≈ คาร์บ 15 g  
<br>
ผัก 1 ทัพพี ≈ คาร์บ 3-5 g  
<br>
ผลไม้ 1 ส่วน ≈ คาร์บ 15 g  
<br>
น้ำมัน 1 ช้อนชา ≈ ไขมัน 4.5 g  
</div>
<div class="bg-purple-50 p-4 rounded-xl text-xs">

<div class="font-bold text-purple-700 mb-2">
🥤 ข้อมูลโภชนาการ BodyKey และโปรตีนเสริม
</div>

<b>BodyKey 1 ซอง</b><br>
โปรตีน 17 g<br>


<b>All Plant Protein</b><br>
1 ช้อน ≈ โปรตีน 17 g

<br>

<b>Green Tea Protein</b><br>
1 ช้อน ≈ โปรตีนประมาณ 10 g

<br>

<b>สูตรที่ใช้ในโปรแกรม (1 มื้อ)</b><br>

BodyKey 1 ซอง  
All Plant 1 ช้อน  
Green Tea Protein 1 ช้อน

<br>

ให้สารอาหารประมาณ

<br>

โปรตีน ≈ 38–40 g  
พลังงาน ≈ 300 kcal

</div>
</div>
`;

}
   
   /* SUMMARY */

function generateSummary(){

if(!globalData.body){
summarySection.innerHTML="วิเคราะห์ร่างกายก่อน";
return;
}

let d=globalData.body;

let riskHTML="";

if(globalData.riskSummary){

let top=getTopRiskAdvice();

top.forEach((r,i)=>{

riskHTML+=`

<b>${i+1}. ${r.title}</b><br>

${r.advice}<br><br>

`;

});

}

summarySection.innerHTML=

`
<div class="bg-white p-4 rounded-xl shadow">

<h3 class="font-bold text-emerald-700 mb-2">
รายงานสุขภาพ
</h3>

ชื่อ ${d.name}<br>
น้ำหนัก ${d.w} kg<br>
ไขมัน ${d.bf}%<br>
กล้ามเนื้อ ${d.m} kg<br><br>

ควรลดไขมัน ${d.fatToLose.toFixed(1)} kg<br>
ควรเพิ่มกล้ามเนื้อ ${d.muscleToGain.toFixed(1)} kg

<hr class="my-3">

<h3 class="font-bold text-emerald-700">
3 ปัจจัยที่ควรปรับก่อน
</h3>

${riskHTML}

</div>
`;

}

/* SAVE IMAGE */

function saveImage(){

html2canvas(summarySection)
.then(canvas=>{

let link=document.createElement("a");
link.download="report.png";
link.href=canvas.toDataURL();
link.click();

});

}

</script>

</body>
</html>
